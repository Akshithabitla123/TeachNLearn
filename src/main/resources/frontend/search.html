<!DOCTYPE html>
<html lang="en">
<head>

    <title>Search Skills</title>
    <link rel="stylesheet" href="/frontend/style.css" />

            <img src="../assets/images/profile1.jpg" alt="mentor" />

            <a href="profile.html">View Profile</a>
        </div>

        <div class="mentor-card">
            <img src="../assets/images/profile2.jpg" alt="mentor" />
            <h3>Rahul</h3>
            <p>Java Mentor</p>
            <span>Experience: Intermediate</span>
            <span>⭐ 4.7</span>
            <a href="profile.html">View Profile</a>
        </div>

    </div>

</div>

</html>
