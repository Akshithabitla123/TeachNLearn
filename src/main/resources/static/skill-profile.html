<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"> <meta name="viewport"content="width=device-width, initial-scale=1.0">
    <title>Mentor Profile</title>
    <link rel="stylesheet" href="skill-profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com"  crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="profile-container">
    <div class="mentor-card">
        <img id="mentorImage">
        <h1 id="mentorName"></h1>
        <p id="mentorBio"></p>
        <div class="social-links">
            <a id="linkedinLink" target="_blank">
                <i class="fab fa-linkedin"></i>LinkedIn</a>
            <a id="githubLink" target="_blank">
                <i class="fab fa-github"></i>GitHub</a>
        </div>
        <div class="rating">
            <i class="fa-solid fa-star"></i> <span id="mentorRating"></span>
        </div>
        <button class="view-btn" onclick="loadSkills()">
            View All skills
        </button>
    </div>

    <div class="skill-section" id="skillSection" style="display:none;">
        <h2>Selected Skill</h2>
        <div class="skill-card">
            <h3 id="skillTitle"></h3>
            <p
                    class="description"
                    id="skillDescription"
            ></p>
            <div class="skill-meta">
                <span id="skillCategory"></span>
                <span id="skillLevel"></span>
            </div>
            <div
                    class="price"
                    id="skillPrice"
            ></div>
            <div id="bookingButtonContainer">
                <button class="book-btn" onclick="openBookingModal()">
                    Book Session
                </button>
            </div>
        </div>
        <!-- reviews and comments -->
        <div class="reviews-section">
            <h2>Learner's pov on mentor & session</h2>
            <div id="reviewsContainer">

            </div>
        </div>
    </div>
    <div
            class="booking-modal"
            id="bookingModal"
    >
        <div class="booking-box">
            <h2>Book Session</h2>
            <input
                    type="datetime-local"
                    id="sessionDate"
            />
            <textarea
                    id="bookingMessage"
                    placeholder="Add message (optional)"
            ></textarea>
            <div class="booking-actions">
                <button onclick="closeBookingModal()">
                    Cancel
                </button>
                <button onclick="bookSession()">
                    Confirm Booking
                </button>
            </div>
        </div>
    </div>
    <div
            class="booking-popup"
            id="bookingPopup"
    >
        <div class="booking-popup-box">
            <div class="popup-header">
                <h2>
                    Booking Details
                </h2>
                <button
                        onclick="closeBookingPopup()"
                >&times;
                </button>
            </div>
            <div id="bookingDetails">
            </div>
        </div>
    </div>
</div>

<script>
    let isSelfProfile=false;
    //block previous dates from today
    document.getElementById("sessionDate").min =new Date().toISOString().slice(0, 16);
    const token=localStorage.getItem("token");
    const user=JSON.parse(localStorage.getItem("user"));
    if(!user){
        alert("Login required");
        window.location.href="login.html";
    }
    const params =
        new URLSearchParams(window.location.search);

    const userId =
        params.get("userId");

    const skillId =
        params.get("skillId");

    console.log(userId);
    console.log(skillId);

    async function loadMentorOnly(){

    try{

        const response=await authFetch(`http://localhost:9090/users/${userId}`);
        const mentor= await response.json();
        document.getElementById("mentorImage").src=mentor.profileImage ||"https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

        document.getElementById("mentorName").innerText=mentor.name;
        document.getElementById("mentorBio").innerText=mentor.bio ||"No bio available";
        document.getElementById("mentorRating").innerText=mentor.rating || "Not Rated"
        document.getElementById("linkedinLink").href=mentor.linkedIn || "#";
        document.getElementById("githubLink").href=mentor.github || "#";
    }
    catch(error){
        console.log(error);
        alert("Failed to load mentor");
    }
}
    async function loadProfile(){

        try{

            const response = await authFetch(`http://localhost:9090/skills/user/${userId}/skill/${skillId}`);
            if(!response.ok){
                console.log("Status: ",response.status);
                const text=await response.text();
                console.log(text);
                throw new Error(`API failed ${response.status}`);
            }
            const skill = await response.json();
            console.log(skill);
            const user = skill.userDTO;
            const loggedUser=JSON.parse(localStorage.getItem("user"));
            if(loggedUser && loggedUser.id==user.id){
                isSelfProfile=true;
            }
            // USER INFO
            document.getElementById("mentorImage").src =user.profileImage ||"https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById("mentorName").innerText =user.name;
            document.getElementById("mentorBio").innerText =user.bio || "No bio available";
            document.getElementById("mentorRating").innerText = user.rating || "Not Rated";
            document.getElementById("linkedinLink").href = user.linkedIn || "#";
            document.getElementById("githubLink").href = user.github || "#";
            // SKILL INFO
            document.getElementById("skillTitle").innerText = skill.title;
            document.getElementById("skillDescription").innerText =skill.description;
            document.getElementById("skillCategory").innerText = "Category : " + skill.category;
            document.getElementById("skillLevel").innerText ="Level : " + skill.experienceLevel;
            document.getElementById("skillPrice").innerHTML =`<i class="fa-solid fa-indian-rupee-sign"></i> ${skill.price}`;
            const container=document.getElementById("bookingButtonContainer");
            if(isSelfProfile){
                container.innerHTML=`<button class="book-btn" style="cursor:not-allowed">You cannot book your own session</button>`
            }
        }
        catch(error){

            console.log(error);

            alert("Failed to load mentor profile");
        }
    }

    async function loadSkills(){
    try{
        const response = await authFetch(
            `http://localhost:9090/skills/user/${userId}`);
        const skills = await response.json();
        const skillSection = document.querySelector(".skill-section");
        skillSection.innerHTML = `
            <h2 class="all-skills-heading">All Skills</h2>
            <div id="allSkillsContainer"></div>
        `;
        const container =document.getElementById("allSkillsContainer");
        skills.forEach(skill => {
            container.innerHTML += `
                <div class="all-skill-card" ondblclick="skillProfile(${skill.userDTO.id},${skill.id})">
                    <div class="all-skill-content">
                        <h3>${skill.title}</h3>
                        <p>${skill.description}</p>
                        <div class="all-skill-meta">
                            <span>${skill.category}</span>
                            <span>${skill.experienceLevel}</span>
                            <span> <i class="fa-solid fa-indian-rupee-sign"></i>${skill.price}</span>
                        </div>
                    </div>
                </div>
            `;
        });
        skillSection.scrollIntoView({
            behavior:"smooth"
        });
    }
    catch(error){
        console.log(error);
        alert("Failed to load skills");
    }
}
function skillProfile(userId,skillId){
window.location.href=`skill-profile.html?userId=${userId}&skillId=${skillId}`;
}
// reviews and comments
async function loadReviews(){
    try{
        const response=await authFetch(`http://localhost:9090/rating/mentor/${userId}`);
        const reviews=await response.json();
        const container=document.getElementById("reviewsContainer");
        container.innerHTML="";
        if(reviews.length===0){
            container.innerHTML=`<p>No reviews yet</p>`;
            return;
        }
        reviews.forEach(review=>{
            let stars="";
            for(let i=0;i<review.stars;i++){
                stars+=`<i class="fa-solid fa-star"></i>`;
            }
            container.innerHTML += `
            <div class="review-card">
                <div class="review-top">
                    <div class="review-user">
                        <i class="fa-solid fa-circle-user"></i>
                        <span>${ review.learnerName}</span>
                    </div>
                    <div class="review-stars">${stars}</div>
                </div>
                <div class="review-comment">${review.comment||"No feedback"}
                </div>
            </div>
            `;
        });
    }
    catch(error){
        console.log(error);
    }
}

function openBookingModal(){
    if(!localStorage.getItem("token")){
        alert("Login required");
        return;
    }
    document.getElementById("bookingModal")
    .style.display="flex";
}

function closeBookingModal(){
    document.getElementById("bookingModal")
    .style.display="none";
}

async function bookSession(){
    const token=localStorage.getItem("token");
    if(!token){
        alert("Login required");
        window.location.href="login.html";
    }
    
    const sessionDate=document.getElementById("sessionDate").value;
    const message=document.getElementById("bookingMessage").value;
    if(sessionDate===""){
        alert("Select session date");
        return;
    }
    try{
        const bookingData={
            studentId:user.id,
            mentorId:userId,
            skillId:skillId,
            sessionDate:sessionDate,
            message:message
        };
        const response=await authFetch(
            "http://localhost:9090/bookings",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(bookingData)
            }
        );
        console.log(bookingData);
        if(response.ok){
            const booking=await response.json();
            alert("Session booked successfully");
            closeBookingModal();
            updateBookingUI(booking.id);
        }
        else{
            const errorText=await response.json();
            closeBookingModal();
            throw new Error(errorText.error);
            
        }
    }
    catch(error){
        console.log(error);
        alert(error.message);
    }
}
    function updateBookingUI(bookingId){
    const container=document.getElementById("bookingButtonContainer");
     
    container.innerHTML = `
    <div class="booking-buttons">
        <button
            class="booked-btn"
            disabled
        >
            Session Booked
        </button>

        <button
            class="details-btn"
            onclick="viewBooking(${bookingId})"
        >
            View Booking
        </button>
    </div>
    `;
}
 function formatSlot(slot){
            const date=new Date(slot);
            const day=String(date.getDate()).padStart(2,"0");
            const month=String(date.getMonth()+1).padStart(2,"0");
            const year=date.getFullYear();
            const hours=String(date.getHours()).padStart(2,"0");
            const minutes=String(date.getMinutes()).padStart(2,"0");
            return `${day}/${month}/${year} ${hours}:${minutes}`;
}
async function viewBooking(bookingId){
    try {
        const response=await authFetch(`http://localhost:9090/bookings/${bookingId}`);
        const booking=await response.json();
         document.getElementById(
        "bookingDetails"
        ).innerHTML = `

        <div class="detail-row">
            <span>Student</span>
            <p>${booking.student.name}</p>
        </div>

        <div class="detail-row">
            <span>Mentor</span>
            <p>${booking.mentor.name}</p>
        </div>

        <div class="detail-row">
            <span>Skill</span>
            <p>${booking.skill.title}</p>
        </div>

        <div class="detail-row">
            <span>Date</span>
            <p>${formatSlot(booking.sessionDate)}</p>
        </div>

        <div class="detail-row">
            <span>Status</span>
            <p class="status">
                ${booking.status}
            </p>
        </div>

        <div class="detail-row">
            <span>Message</span>
            <p>
            ${
                booking.message ||
                "No message"
            }
            </p>
        </div>

        `;

        document.getElementById(
        "bookingPopup"
        ).style.display="flex";
    } catch (error) {
        console.log(error);
        alert("Failed to load booking");
    }

}

async function checkBookingStatus(){
    const user=JSON.parse(localStorage.getItem("user"));
    
    if(!user){
        return;
    }
    try{
        const response=await authFetch(`http://localhost:9090/bookings/check?skillId=${skillId}`);
        if(!response.ok){
            return;
        }
        const booking=await response.json();
        if(booking && booking.id){
            updateBookingUI(booking.id);
        }
    }catch(error){
        console.log(error);
    }
}
function closeBookingPopup(){
    document.getElementById("bookingPopup").style.display="none";
}

async function initialize(){
    const section=document.getElementById("skillSection");
    if(!skillId){
        section.style.display="block";
        await loadMentorOnly();
        await loadSkills();
        await loadReviews();
        return;
    }
    else{
        await loadProfile();
        await checkBookingStatus();
        await loadReviews();
        section.style.display="block";
    }
    
}

//detects expired or invalid tokens and redirects to login
let sessionExpired=false;
async function authFetch(url,options={}){
    const currToken=localStorage.getItem("token");
    const headers={
        ...(options.headers || {}),
        Authorization:`Bearer ${currToken}`
    };
    const response=await fetch(url,{...options
        ,headers
    });

    if(response.status===401 || response.status===403){
        if(!sessionExpired){
            sessionExpired=true;
            localStorage.clear();
            alert("Session expired, please login again");
            window.location.href="login.html";
        }
        
        throw new Error("Session Expired");
    }
    return response;
}
initialize()


</script>

</body>
</html>
