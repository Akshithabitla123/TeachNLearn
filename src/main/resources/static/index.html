<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeachNLearn</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<nav class="navbar">
    <div class="logo"><i class="fa-solid fa-graduation-cap"></i>TeachNLearn</div>

    <ul class="nav-links">
        <li><a class="active" href="index.html">Home</a></li>
        <li><a href="#" onclick="openDashboard(event)">Dashboard</a></li>
    </ul>
    <div class="nav-actions" id="navActions">

    </div>
</nav> 

<section class="hero">
    <div class="hero-content">
        <h1 class="hero-title">Learn Skills.<span>Share Knowlege.</span>Grow Together.</h1>
        <p class="hero-subtitle">Empowering Learners and Mentors to connect, collaborate,
            and thrive through meaningful knowledge sharing.</p>

        <div class="hero-search">
            <input type="text" id="searchInput" placeholder="Search Java, React, Spring Boot..." />
            <button onclick="searchSkills()">Search</button>
        </div>
    </div>
</section>
<section class="skills-section" id="searchSection" style="display:none;">
    <h2>Search Results</h2>
    <div class="skills-grid" id="searchResults"></div>
</section>


<section class="skills-section">
    <h2>Trending Skills</h2>
    <div class="skills-grid" id="skillsContainer"></div>
</section>

<section class="mentors-section">
    <h2>Top Mentors</h2>
    <div class="mentors-grid" id="topMentorsContainer"></div>
</section>

<footer>
    <p><p><i class="fa-regular fa-copyright"></i> 2026 TeachNLearn. All Rights Reserved.</p>
</footer>
<script>
    loadTopMentors();
    loadTrendingSkills();
    async function loadTopMentors(){
        try{
            const response=await fetch("http://localhost:9090/users/top-mentors");
            const mentors=await response.json();

            const container=document.getElementById("topMentorsContainer");
            container.innerHTML="";
            mentors.forEach(
                mentor=>{
                    container.innerHTML+=`
                     <div class="mentor-card">
                    <div class="mentor-top"></div>
                    <div class="mentor-content">
                        <img src="${mentor.profileImage || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"}" />
                        <h3>${mentor.name}</h3>
                        <p class="mentor-skill">
                            ${mentor.bio}
                        </p>
                        <div class="mentor-rating">
                            <i class="fa-solid fa-star"></i>${mentor.rating}
                        </div>
                        <button class="view-btn" onclick="viewMentor(${mentor.id})">
                            View Profile
                        </button>
                    </div>
                </div> 
                    `
                }
            )
        }catch(error){
            console.log(error);
        }
    }
    function viewMentor(userId){
        window.location.href=`skill-profile.html?userId=${userId}`;
    }
    async function loadTrendingSkills(){
        try{
            const response=await fetch("http://localhost:9090/skills/random");
            const skills=await response.json();
            const container=document.getElementById("skillsContainer");
            container.innerHTML="";
            skills.forEach(skill=>{
                container.innerHTML+=`
                <div class="skill-card">
                    <h3>${skill.title}</h3>
                    <p>${skill.category}</p>
                    <span>Mentor: ${skill.userDTO.name}</span>
                </div>
                `
            })
        }catch(error){
            console.log(error);
        }
    }
    function goToLogin() {

        window.location.href = "login.html";
    }
    function logoutUser(){
    localStorage.clear();
    alert("Logged out");
    window.location.reload();
}

function updateNavbar(){
    const navActions=document.getElementById("navActions");
    const user=JSON.parse(localStorage.getItem("user"));

    if(user){
        navActions.innerHTML = `
            <span style="
                color:#30369e;
                font-weight: 600;
                margin-right: 15px;
            ">
                Hi ${user.name}
            </span>

            <button onclick="
                window.location.href='dashboard.html'
            ">
                Dashboard
            </button>

            <button onclick="logoutUser()">
                Logout
            </button>
        `;
    }
    else{
        navActions.innerHTML = `
            <button onclick="goToLogin()">
                Login
            </button>
        `;
    }
}

function openDashboard(event){
    event.preventDefault();
    const user=JSON.parse(localStorage.getItem("user"));
    if(user){
        window.location.href="dashboard.html";
    }
    else{
        window.location.href="login.html";
    }
}
   updateNavbar();

async function searchSkills(){
    const keyword=document.getElementById("searchInput").value;
    if(keyword.trim()===""){
        alert("Enter a skill");
        return;
    }
    try{
        const response=await fetch(`http://localhost:9090/skills/search?keyword=${keyword}`);
        const skills=await response.json();
        const container=document.getElementById("searchResults");
        document.getElementById("searchSection").style.display="block";
        container.scrollIntoView({behavior:"smooth"});
        container.innerHTML="";
        const user=JSON.parse(localStorage.getItem("user"));
        const filteredSkills=skills.filter(skill=>{
            if(!user){
                return true;
            }
            return skill.userDTO.id!=user.id;
        });
        if(filteredSkills.length===0){
            container.innerHTML="<h3>No Mentors Found</h3>";
            return;
        }
        filteredSkills.forEach(skill=>{
            container.innerHTML+=
            `<div class="mentor-card">
            <div class="mentor-top"></div>

            <div class="mentor-content">

                <img
                    src="
                        https://cdn-icons-png.flaticon.com/512/3135/3135715.png
                    "
                    alt="mentor"
                />

                <h3>
                    ${skill.userDTO.name}
                </h3>

                <p class="mentor-skill">
                    ${skill.title}
                </p>

                <div class="mentor-rating">
                    <i class="fa-solid fa-star"></i> ${skill.userDTO.rating || 0}
                </div>

                <div class="mentor-level">
                    ${skill.experienceLevel}
                </div>

                <button
                    class="view-btn"
                    onclick="viewProfile(${skill.userDTO.id},${skill.id})"
                >
                    View Profile
                </button>

            </div>

            `;
        });

    }catch(error){
        console.log(error);
        alert(error);
    }
}

function viewProfile(userId,skillId){
    const user=localStorage.getItem("user");
    if(!user){
        alert("Please login to view the profile");
        window.location.href="login.html";
        return;
    }
    window.location.href=`skill-profile.html?userId=${userId}&skillId=${skillId}`;
}

const searchInput=document.getElementById("searchInput");
searchInput.addEventListener("keydown",function(event){
    if(event.key==="Enter"){
        event.preventDefault();
        searchSkills();
    }
});


</script>

</body>
</html>
