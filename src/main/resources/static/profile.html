<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentor Profile</title>
    <link rel="stylesheet" href="/frontend/style.css" />
</head>
<body>

<section class="profile-section">

    <div class="profile-header">
        <img src="../assets/images/profile1.jpg" alt="mentor" />

        <div>
            <h1>Akshitha</h1>
            <p>Spring Boot Developer & Mentor</p>
            <span>⭐ 4.9</span>
        </div>
    </div>

    <div class="profile-about">
        <h2>About</h2>
        <p>
            Passionate backend developer helping students learn Spring Boot,
            Java, and Microservices.
        </p>
    </div>

    <div class="profile-skills">
        <h2>Skills</h2>

        <div class="skills-tags">
            <span>Java</span>
            <span>Spring Boot</span>
            <span>Docker</span>
            <span>Microservices</span>
        </div>
    </div>

    <div class="profile-links">
        <a href="#">LinkedIn</a>
        <a href="#">GitHub</a>
    </div>

    <button class="book-btn">Book Session</button>

</section>

</body>
</html>
